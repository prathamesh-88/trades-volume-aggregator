# Kafka
kafka.bootstrap.servers=localhost:9092
kafka.consumer.topic=trade-events
kafka.producer.topic=volume-snapshots
kafka.group.id=volume-aggregator-group

# Aeron
aeron.subscriber.channel=aeron:udp?endpoint=localhost:40123
aeron.subscriber.stream.id=1001
aeron.publisher.channel=aeron:udp?endpoint=localhost:40124
aeron.publisher.stream.id=1002

# Snapshot emission interval
snapshot.interval.ms=1000

# Chronicle Map (off-heap storage)
chronicle.map.entries=1000000
