# Local dependencies for Trade Volume Aggregator.
#
# Default (aggregator JAR on your machine, embedded Aeron Media Driver):
#   docker compose up -d kafka kafka-init kafka-ui
#   Kafka UI: http://localhost:8080
#
# Kafka broker: official Apache image (Bitnami public tags are often unavailable).
#
# Optional standalone Aeron Media Driver (see SETUP.md — port conflict with embedded driver):
#   docker compose --profile aeron up -d
#
services:
  kafka:
    image: docker.io/apache/kafka:3.9.2
    container_name: trade-volume-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # Host apps use localhost:9092; in-compose clients use kafka:19092 (correct metadata).
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  kafka-init:
    image: docker.io/apache/kafka:3.9.2
    container_name: trade-volume-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Kafka at kafka:19092..."
        for i in $(seq 1 90); do
          if /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 >/dev/null 2>&1; then
            echo "Kafka is reachable."
            break
          fi
          sleep 2
        done
        /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 >/dev/null
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:19092 --topic trade-events --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:19092 --topic volume-snapshots --partitions 3 --replication-factor 1
        echo "Kafka topics ready."
    restart: "no"

  # Web UI: browse topics/messages, consumer groups, produce test payloads (in-cluster bootstrap).
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: trade-volume-kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

  # Standalone Media Driver for Docker-only Aeron clients. NOT for use together with the
  # default app on the same host UDP ports (app embeds MediaDriver on 40123/40124).
  aeron-media-driver:
    profiles: ["aeron"]
    build:
      context: ./docker/aeron-media-driver
      dockerfile: Dockerfile
    container_name: trade-volume-aeron-md
    ports:
      - "40123:40123/udp"
      - "40124:40124/udp"
    # Writable cnc / aeron dir
    tmpfs:
      - /tmp/aeron-docker:rw,size=64m,mode=1777
